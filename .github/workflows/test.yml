name: Test

on:
  push:
    branches: [main]
    paths: ['packages/**']
  pull_request:
    branches: [main]
    paths: ['packages/**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Type check
        run: |
          for pkg in packages/*/; do
            echo "::group::tsc $pkg"
            npx tsc --noEmit -p "$pkg"
            echo "::endgroup::"
          done

      - run: npx vitest run
