<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Inter, sans-serif; margin: 16px; }
    textarea { width: 100%; height: 150px; font-family: monospace; font-size: 12px; }
    button { margin-top: 8px; padding: 8px 16px; background: #18a0fb; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #0d8de5; }
    #status { margin-top: 12px; font-size: 13px; color: #333; }
    .error { color: #f24822; }
    .success { color: #1bc47d; }
    input[type="file"] { margin-bottom: 8px; display: block; }
  </style>
</head>
<body>
  <h3>Figma DSL Runner</h3>
  <input type="file" id="fileInput" accept=".js" />
  <textarea id="code" placeholder="Paste bundled DSL code here..."></textarea>
  <button id="run">Run DSL</button>
  <div id="status"></div>

  <script>
    const codeArea = document.getElementById('code');
    const statusDiv = document.getElementById('status');
    const fileInput = document.getElementById('file');

    document.getElementById('fileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = () => { codeArea.value = reader.result; };
        reader.readAsText(file);
      }
    });

    document.getElementById('run').addEventListener('click', () => {
      const code = codeArea.value.trim();
      if (!code) {
        statusDiv.textContent = 'Please enter or load DSL code.';
        statusDiv.className = 'error';
        return;
      }
      statusDiv.textContent = 'Running...';
      statusDiv.className = '';
      parent.postMessage({ pluginMessage: { type: 'run-dsl', code } }, '*');
    });

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (msg.type === 'result') {
        const count = Object.keys(msg.componentMap).length;
        statusDiv.innerHTML = `<span class="success">Created ${count} components.</span>`;
        if (msg.errors.length > 0) {
          statusDiv.innerHTML += `<br><span class="error">${msg.errors.length} warnings.</span>`;
        }
        statusDiv.innerHTML += `<pre>${JSON.stringify(msg.componentMap, null, 2)}</pre>`;
      } else if (msg.type === 'error') {
        statusDiv.innerHTML = `<span class="error">Error: ${msg.errors.map(e => e.error).join(', ')}</span>`;
      }
    };
  </script>
</body>
</html>
