<div style="padding:16px;font-family:Inter,sans-serif">
  <style>
    .tab-bar { display:flex; border-bottom:1px solid #ccc; margin-bottom:12px; }
    .tab-bar button { padding:8px 16px; border:none; background:none; cursor:pointer; font-size:14px; border-bottom:2px solid transparent; }
    .tab-bar button.active { border-bottom-color:#18A0FB; font-weight:600; }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }
    .export-btn { padding:8px 16px; cursor:pointer; margin-right:8px; }
    .copy-btn { padding:4px 12px; cursor:pointer; font-size:12px; }
    .ws-status { font-size:11px; padding:4px 8px; border-radius:4px; display:inline-block; margin-bottom:8px; }
    .ws-status.connected { background:#e6f9e6; color:#1a7a1a; }
    .ws-status.disconnected { background:#f9e6e6; color:#7a1a1a; }
    .ws-status.connecting { background:#fff3cd; color:#856404; }
  </style>

  <div class="ws-status disconnected" id="wsStatus">MCP: Disconnected</div>

  <div class="tab-bar">
    <button class="active" onclick="switchTab('import')">Import</button>
    <button onclick="switchTab('export')">Export</button>
  </div>

  <div id="tab-import" class="tab-panel active">
    <textarea id="input" style="width:100%;height:160px" placeholder="Paste plugin input JSON here..."></textarea>
    <br><br>
    <label><input type="checkbox" id="autoExport" checked> Auto-export PNGs after import</label>
    <br><br>
    <button id="import" style="padding:8px 16px;cursor:pointer">Import Components</button>
  </div>

  <div id="tab-export" class="tab-panel">
    <div style="margin-bottom:8px">
      <label><strong>Mode:</strong></label>
      <select id="exportMode" style="margin-left:8px">
        <option value="changeset">Changeset (diff)</option>
        <option value="complete">Complete DSL JSON</option>
      </select>
    </div>
    <div style="margin-bottom:8px">
      <label><strong>Canvas Export:</strong></label>
      <select id="canvasExportMode" style="margin-left:8px">
        <option value="nodes" selected>As DSL Nodes</option>
        <option value="images">As Images</option>
      </select>
    </div>
    <div id="scaleRow" style="margin-bottom:8px;display:none">
      <label><strong>Scale:</strong></label>
      <select id="exportScale" style="margin-left:8px">
        <option value="1">1x</option>
        <option value="2" selected>2x</option>
        <option value="3">3x</option>
        <option value="4">4x</option>
      </select>
    </div>
    <div style="margin-bottom:12px">
      <label><strong>Scope:</strong></label>
      <select id="exportScope" style="margin-left:8px">
        <option value="selection">Selected Components</option>
        <option value="page">All on Page</option>
      </select>
    </div>
    <button class="export-btn" id="exportBtn">Export</button>
    <button class="export-btn" id="cancelExportBtn" style="display:none;background:#ff4444;color:white;border:none;border-radius:4px">Cancel</button>
    <div id="exportProgress" style="display:none;font-size:12px;margin:8px 0;color:#666">
      <div id="exportProgressText"></div>
      <div style="background:#eee;height:4px;border-radius:2px;margin-top:4px">
        <div id="exportProgressBar" style="background:#18A0FB;height:100%;border-radius:2px;width:0;transition:width 0.3s"></div>
      </div>
    </div>
    <br>
    <textarea id="exportOutput" style="width:100%;height:200px" readonly placeholder="Export result will appear here..."></textarea>
    <br>
    <button class="copy-btn" id="copyBtn">Copy to Clipboard</button>
    <button class="copy-btn" id="downloadBtn" style="display:none;margin-left:8px">Download ZIP</button>
  </div>

  <div id="progress" style="font-size:12px;margin-top:8px;color:#666"></div>
  <pre id="output" style="font-size:12px;margin-top:8px;max-height:200px;overflow:auto"></pre>
  <script>
    // --- Tab Switching ---
    function switchTab(tab) {
      document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelector('.tab-bar button:nth-child(' + (tab === 'import' ? '1' : '2') + ')').classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
    }

    // --- UI Button Handlers ---
    document.getElementById('import').onclick = () => {
      const input = document.getElementById('input').value;
      const autoExport = document.getElementById('autoExport').checked;
      parent.postMessage({ pluginMessage: { type: 'import', data: input, autoExport } }, '*');
    };
    // Canvas export mode toggle — show/hide scale selector
    document.getElementById('canvasExportMode').onchange = () => {
      const mode = document.getElementById('canvasExportMode').value;
      document.getElementById('scaleRow').style.display = mode === 'images' ? 'block' : 'none';
    };
    var lastZipBytes = null;
    document.getElementById('exportBtn').onclick = () => {
      const mode = document.getElementById('exportMode').value;
      const scope = document.getElementById('exportScope').value;
      const canvasExportMode = document.getElementById('canvasExportMode').value;
      document.getElementById('cancelExportBtn').style.display = 'inline-block';
      document.getElementById('exportProgress').style.display = 'block';
      document.getElementById('exportProgressText').textContent = 'Starting export...';
      document.getElementById('exportProgressBar').style.width = '0';
      document.getElementById('downloadBtn').style.display = 'none';
      lastZipBytes = null;
      var scale = parseInt(document.getElementById('exportScale').value, 10) || 2;
      parent.postMessage({ pluginMessage: { type: 'export-' + mode, scope: scope, scale: scale, canvasExportMode: canvasExportMode } }, '*');
    };
    document.getElementById('cancelExportBtn').onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'export-cancel' } }, '*');
      document.getElementById('cancelExportBtn').style.display = 'none';
      document.getElementById('exportProgress').style.display = 'none';
      document.getElementById('progress').textContent = 'Export cancelled.';
    };
    document.getElementById('copyBtn').onclick = () => {
      const ta = document.getElementById('exportOutput');
      ta.select();
      document.execCommand('copy');
      document.getElementById('progress').textContent = 'Copied to clipboard!';
      setTimeout(() => { document.getElementById('progress').textContent = ''; }, 2000);
    };
    document.getElementById('downloadBtn').onclick = () => {
      if (!lastZipBytes) return;
      const blob = new Blob([lastZipBytes], { type: 'application/zip' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'export.zip';
      a.click();
      URL.revokeObjectURL(url);
    };

    // --- Plugin Message Handler ---
    onmessage = (e) => {
      const msg = e.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'progress') {
        document.getElementById('progress').textContent = msg.text;
      } else if (msg.type === 'export-progress') {
        var pct = msg.total > 0 ? Math.round((msg.current / msg.total) * 100) : 0;
        document.getElementById('exportProgressText').textContent =
          'Capturing: ' + (msg.canvasName || '') + ' (' + msg.current + '/' + msg.total + ')';
        document.getElementById('exportProgressBar').style.width = pct + '%';
      } else if (msg.type === 'export-data') {
        const output = document.getElementById('output');
        output.textContent = msg.summary;
        if (msg.nodeIdMap) {
          output.textContent += '\n\nnode-id-map.json:\n' + JSON.stringify(msg.nodeIdMap, null, 2);
        }
        document.getElementById('progress').textContent = 'Export complete!';
      } else if (msg.type === 'export-result') {
        document.getElementById('cancelExportBtn').style.display = 'none';
        document.getElementById('exportProgress').style.display = 'none';
        if (msg.format === 'zip' && msg.zipBytes) {
          lastZipBytes = msg.zipBytes;
          document.getElementById('exportOutput').value = '[ZIP archive — use Download button]';
          document.getElementById('downloadBtn').style.display = 'inline-block';
        } else {
          lastZipBytes = null;
          document.getElementById('exportOutput').value = msg.json;
          document.getElementById('downloadBtn').style.display = 'none';
        }
        document.getElementById('progress').textContent = msg.summary;
      } else if (msg.type === 'ws-send') {
        // Relay message from plugin code to WebSocket
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(msg.payload));
        }
      } else if (msg.result) {
        document.getElementById('output').textContent = msg.result;
        document.getElementById('progress').textContent = '';
      }
    };

    // --- WebSocket Client ---
    var ws = null;
    var wsReconnectTimer = null;
    var heartbeatTimer = null;
    var WS_PORT = 9800;
    var RECONNECT_INTERVAL = 5000;
    var HEARTBEAT_INTERVAL = 30000;

    function updateWsStatus(status, text) {
      var el = document.getElementById('wsStatus');
      el.className = 'ws-status ' + status;
      el.textContent = 'MCP: ' + text;
    }

    function connectWs() {
      if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) {
        return;
      }

      updateWsStatus('connecting', 'Connecting...');

      try {
        ws = new WebSocket('ws://localhost:' + WS_PORT);
      } catch (err) {
        updateWsStatus('disconnected', 'Connection failed');
        scheduleReconnect();
        return;
      }

      ws.onopen = function() {
        updateWsStatus('connected', 'Connected');
        if (wsReconnectTimer) {
          clearTimeout(wsReconnectTimer);
          wsReconnectTimer = null;
        }

        // Send handshake — plugin code will provide file key via postMessage
        parent.postMessage({ pluginMessage: { type: 'ws-connected' } }, '*');

        // Start heartbeat
        if (heartbeatTimer) clearInterval(heartbeatTimer);
        heartbeatTimer = setInterval(function() {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'heartbeat', timestamp: new Date().toISOString() }));
          }
        }, HEARTBEAT_INTERVAL);
      };

      ws.onmessage = function(event) {
        try {
          var data = JSON.parse(event.data);
          // Relay WebSocket messages to plugin code
          parent.postMessage({ pluginMessage: { type: 'ws-message', payload: data } }, '*');
        } catch (err) {
          // Ignore malformed messages
        }
      };

      ws.onclose = function() {
        updateWsStatus('disconnected', 'Disconnected');
        stopHeartbeat();
        parent.postMessage({ pluginMessage: { type: 'ws-disconnected' } }, '*');
        scheduleReconnect();
      };

      ws.onerror = function() {
        // onclose will fire after onerror
      };
    }

    function stopHeartbeat() {
      if (heartbeatTimer) {
        clearInterval(heartbeatTimer);
        heartbeatTimer = null;
      }
    }

    function scheduleReconnect() {
      if (wsReconnectTimer) return;
      wsReconnectTimer = setTimeout(function() {
        wsReconnectTimer = null;
        connectWs();
      }, RECONNECT_INTERVAL);
    }

    // Auto-connect on load
    connectWs();
  </script>
</div>
